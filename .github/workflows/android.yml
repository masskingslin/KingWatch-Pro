name: Build KingWatch APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip openjdk-17-jdk build-essential libssl-dev libffi-dev python3-dev autoconf libtool pkg-config cmake
          pip install buildozer==1.5.0 cython==0.29.33
          SDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK/cmdline-tools
          cd $SDK/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          yes | ./latest/bin/sdkmanager --licenses || true
          ./latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"
          mkdir -p $SDK/tools/bin
          ln -sf $SDK/cmdline-tools/latest/bin/sdkmanager $SDK/tools/bin/sdkmanager
          buildozer android debug 2>&1 | tee build.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: apk-or-log
          path: |
            bin/*.apk
            build.log