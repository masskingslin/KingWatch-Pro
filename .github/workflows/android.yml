name: Build KingWatch APK

on:
push:
branches: [ main ]
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-22.04

steps:

- name: Checkout repository
  uses: actions/checkout@v4

- name: Install dependencies
  run: |
    sudo apt update
    sudo apt install -y git zip unzip openjdk-17-jdk \
    python3-pip autoconf libtool pkg-config \
    zlib1g-dev libncurses-dev cmake \
    libffi-dev libssl-dev

- name: Install Python packages
  run: |
    python3 -m pip install --upgrade pip
    pip install cython==0.29.36
    pip install buildozer

- name: Install Android SDK
  run: |
    mkdir -p $HOME/android-sdk/cmdline-tools
    cd $HOME/android-sdk

    wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
    unzip -q commandlinetools-linux-9477386_latest.zip

    mv cmdline-tools latest
    mkdir -p cmdline-tools
    mv latest cmdline-tools/

    export ANDROID_HOME=$HOME/android-sdk
    export ANDROID_SDK_ROOT=$HOME/android-sdk
    export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

    yes | sdkmanager --licenses

    sdkmanager "platform-tools"
    sdkmanager "platforms;android-31"
    sdkmanager "build-tools;31.0.0"

- name: Force Buildozer to use SDK
  run: |
    mkdir -p $HOME/.buildozer/android/platform
    ln -s $HOME/android-sdk $HOME/.buildozer/android/platform/android-sdk || true

- name: Build APK
  run: |
    export ANDROIDSDK=$HOME/android-sdk
    export ANDROID_HOME=$HOME/android-sdk
    export ANDROID_SDK_ROOT=$HOME/android-sdk
    buildozer android debug

- name: Upload APK
  uses: actions/upload-artifact@v4
  with:
    name: KingWatch-Pro-APK
    path: bin/*.apk