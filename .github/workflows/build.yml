name: Build KingWatch Pro v15 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:    # Manual trigger from GitHub mobile UI

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    # ── 1. Checkout ─────────────────────────────────────────────────────
    - name: Checkout
      uses: actions/checkout@v4

    # ── 2. Python 3.11 ──────────────────────────────────────────────────
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # ── 3. System packages ───────────────────────────────────────────────
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git zip unzip curl wget \
          openjdk-17-jdk \
          python3-pip \
          autoconf automake libtool \
          pkg-config \
          libffi-dev libssl-dev \
          libltdl-dev zlib1g-dev \
          libgdbm-dev libc6-dev \
          libbz2-dev libsqlite3-dev \
          liblzma-dev libreadline-dev \
          ccache

    # ── 4. Buildozer + Cython ─────────────────────────────────────────
    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip wheel setuptools
        pip install buildozer==1.5.0 cython==3.0.11

    # ── 5. Android SDK / NDK cache (saves ~12 min on repeat builds) ───
    - name: Cache Android platform
      uses: actions/cache@v4
      with:
        path: ~/.buildozer/android/platform
        key: android-platform-${{ runner.os }}-ndk25b-api35
        restore-keys: |
          android-platform-${{ runner.os }}-

    # ── 6. Python packages cache ─────────────────────────────────────
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          pip-${{ runner.os }}-

    # ── 7. Build APK ──────────────────────────────────────────────────
    - name: Build debug APK
      run: |
        buildozer android debug 2>&1 | tee build.log
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

    # ── 8. Upload APK artifact ───────────────────────────────────────
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: KingWatchPro-v15-debug-${{ github.run_number }}
        path: bin/*.apk
        retention-days: 30
        if-no-files-found: error

    # ── 9. Upload build log (always — for debugging failures) ─────────
    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log-${{ github.run_number }}
        path: build.log
        retention-days: 7
        if-no-files-found: warn
