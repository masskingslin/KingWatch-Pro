name: Build KingWatch Pro v15 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    # ── 1. Checkout ──────────────────────────────────────────────────────
    - name: Checkout
      uses: actions/checkout@v4

    # ── 2. Python 3.11 ───────────────────────────────────────────────────
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # ── 3. Java 17 ───────────────────────────────────────────────────────
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: "17"
        distribution: "temurin"

    # ── 4. System packages ───────────────────────────────────────────────
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git zip unzip curl wget \
          python3-pip \
          autoconf automake libtool \
          pkg-config \
          libffi-dev libssl-dev \
          libltdl-dev zlib1g-dev \
          libgdbm-dev libc6-dev \
          libbz2-dev libsqlite3-dev \
          liblzma-dev libreadline-dev \
          ccache

    # ── 5. Buildozer + Cython ────────────────────────────────────────────
    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip wheel setuptools
        pip install buildozer==1.5.0 cython==3.0.11

    # ── 6. Android SDK / NDK cache ───────────────────────────────────────
    # FIX: Bumped to v5 to clear the bad cache entirely
    - name: Cache Android platform
      uses: actions/cache@v4
      with:
        path: ~/.buildozer/android/platform
        key: android-platform-ndk25b-bt34-v5
        restore-keys: |
          android-platform-ndk25b-bt34-

    # ── 7. pip cache ─────────────────────────────────────────────────────
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
        restore-keys: pip-${{ runner.os }}-

    # ── 8. Failsafe SDK Cleanup ──────────────────────────────────────────
    # FIX: Wipes the entire SDK folder so Buildozer is forced to download a fresh one
    - name: Clean corrupted Android SDK
      run: |
        rm -rf ~/.buildozer/android/platform/android-sdk

    # ── 9. Build APK ─────────────────────────────────────────────────────
    - name: Build debug APK
      run: |
        buildozer android debug 2>&1 | tee build.log
      env:
        JAVA_HOME: ${{ env.JAVA_HOME }}
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

    # ── 10. Show bin/ contents ────────────────────────────────────────────
    - name: List built files
      if: always()
      run: |
        echo "=== bin/ ==="
        ls -lh bin/ 2>/dev/null || echo "bin/ not found"
        echo "=== APKs anywhere ==="
        find . -name "*.apk" 2>/dev/null | head -10 || echo "none"

    # ── 11. Upload APK ────────────────────────────────────────────────────
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: KingWatchPro-v15-debug-${{ github.run_number }}
        path: bin/*.apk
        retention-days: 30
        if-no-files-found: error

    # ── 12. Upload build log (always) ─────────────────────────────────────
    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log-${{ github.run_number }}
        path: build.log
        retention-days: 7
        if-no-files-found: warn
        
